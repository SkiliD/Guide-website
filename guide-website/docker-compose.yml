services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guide-website-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NODE_ENV: development
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/.next
    networks:
      - guide-network

networks:
  guide-network:
    external: true
