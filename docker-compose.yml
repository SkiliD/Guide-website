services:
  db:
    image: postgres:16-alpine
    container_name: guide-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: guide_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d guide_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - guide-network

  api:
    build:
      context: ./guide-backend
      dockerfile: Dockerfile
    container_name: guide-backend-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: guide_db
      JWT_SECRET: your-secret-key-change-in-production
      JWT_EXPIRY: 7d
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./guide-backend/src:/app/src
      - ./guide-backend/tsconfig.json:/app/tsconfig.json
      - /app/node_modules
    networks:
      - guide-network

  web:
    build:
      context: ./guide-website
      dockerfile: Dockerfile
    container_name: guide-website-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NODE_ENV: development
    volumes:
      - ./guide-website:/app
      - /app/node_modules
      - /app/.next
    networks:
      - guide-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: guide-pgadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@guide.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - guide-network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  guide-network:
    name: guide-network
    driver: bridge
